<linkset>
  <html:link rel="localization" href="itemnumbering-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.ItemNumbering.hooks.onPrefsEvent('load', { window });"
>
  <label><html:h2 data-l10n-id="itemnumbering-pref-title"></html:h2></label>
  <checkbox
    id="zotero-prefpane-itemnumbering-enable"
    preference="extensions.zotero.itemnumbering.enable"
    data-l10n-id="itemnumbering-pref-enable"
  />
  <hbox>
    <html:label
      for="zotero-prefpane-itemnumbering-input"
      data-l10n-id="itemnumbering-pref-input"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-itemnumbering-input"
      preference="extensions.zotero.itemnumbering.input"
    ></html:input>
  </hbox>
  <hbox class="virtualized-table-container" flex="1" height="300px">
    <html:div id="itemnumbering-table-container" />
  </hbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="itemnumbering-pref-help"
    data-l10n-args='{"time": "2025-06-01 20:11:42","name": "Zotero Item Numbering","version":"0.1.0"}'
  ></html:label>
</vbox>
