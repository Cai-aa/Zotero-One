<linkset>
  <html:link rel="localization" href="zotero-one-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.ZoteroOne.hooks.onPrefsEvent('load', { window });"
>
  <label><html:h2 data-l10n-id="zotero-one-pref-title"></html:h2></label>
  <checkbox
    id="zotero-prefpane-zotero-one-enable"
    preference="extensions.zotero.zotero-one.enable"
    data-l10n-id="zotero-one-pref-enable"
  />
  <hbox>
    <html:label
      for="zotero-prefpane-zotero-one-input"
      data-l10n-id="zotero-one-pref-input"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-zotero-one-input"
      preference="extensions.zotero.zotero-one.input"
    ></html:input>
  </hbox>
  <hbox class="virtualized-table-container" flex="1" height="300px">
    <html:div id="zotero-one-table-container" />
  </hbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="zotero-one-pref-help"
    data-l10n-args='{"time": "2026-02-25 09:17:41","name": "Zotero One","version":"0.1.0"}'
  ></html:label>
</vbox>
