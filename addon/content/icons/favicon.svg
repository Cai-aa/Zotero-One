<?xml version="1.0" encoding="UTF-8"?>
<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="48" cy="48" r="46" fill="url(#backgroundGradient)" stroke="#2980b9" stroke-width="2"/>
  
  <!-- Number "1" for numbering functionality -->
  <text x="24" y="60" 
        font-family="Arial, sans-serif" 
        font-size="48" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle" 
        filter="url(#shadow)">1</text>
  
  <!-- Document icon for preview functionality -->
  <g transform="translate(60, 32)">
    <!-- Document rectangle -->
    <rect x="0" y="0" width="24" height="32" 
          fill="white" 
          stroke="#2980b9" 
          stroke-width="1" 
          rx="1"/>
    
    <!-- Document lines -->
    <line x1="2" y1="8" x2="22" y2="8" 
          stroke="#2980b9" stroke-width="1"/>
    <line x1="2" y1="12" x2="22" y2="12" 
          stroke="#2980b9" stroke-width="1"/>
    <line x1="2" y1="16" x2="19" y2="16" 
          stroke="#2980b9" stroke-width="1"/>
    
    <!-- Eye icon for preview -->
    <ellipse cx="19" cy="4" rx="4" ry="3" 
             fill="#2980b9" opacity="0.8"/>
    <circle cx="19" cy="4" r="2" fill="white"/>
  </g>
  
  <!-- Small accent dots for modern look -->
  <circle cx="48" cy="16" r="1" fill="white" opacity="0.6"/>
  <circle cx="48" cy="80" r="1" fill="white" opacity="0.6"/>
</svg>